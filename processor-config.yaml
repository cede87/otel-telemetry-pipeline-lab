receivers:
  kafka/traces:
    brokers: [kafka:9092]
    topic: otel-traces
    encoding: otlp_proto

processors:
  memory_limiter:
    check_interval: 1s
    limit_mib: 256
    spike_limit_mib: 64
  batch:
    timeout: 5s
    send_batch_size: 1024

exporters:
  otlp/jaeger:
    endpoint: jaeger:4317
    tls:
      insecure: true

service:
  pipelines:
    traces:
      receivers: [kafka/traces]
      processors: [memory_limiter, batch]
      exporters: [otlp/jaeger]
