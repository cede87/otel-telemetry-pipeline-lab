version: "3.9"

services:
  otel-collector:
    image: otel/opentelemetry-collector:0.98.0
    command: ["--config=/etc/otelcol/config.yml"]
    volumes:
      - ./otel-collector-config.yml:/etc/otelcol/config.yml:ro
    networks:
      - telemetry-net
    ports:
      - "4317:4317"

  telemetry-service:
    build: .
    environment:
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
    depends_on:
      - otel-collector
    networks:
      - telemetry-net
    ports:
      - "8000:8000"

networks:
  telemetry-net:
    driver: bridge
